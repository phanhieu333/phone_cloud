# AutoGetJS configuration (Viper)

log_level: info

server:
  port: "8080"

# Base URL api device — khi chạy sẽ GET {device_api_url}/device lấy device_id đầu tiên
device_api_url: "api/devices"

# Device IDs tĩnh (optional), bổ sung hoặc thay thế khi không dùng device_api_url
device_ids: []

# Scripts: id và danh sách links
scripts:
  - id: "1"
    links:
      - "https://example.com/link1"
      - "https://example.com/link2"
